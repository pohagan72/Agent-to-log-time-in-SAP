<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SAP Hours Agent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .header {
      background: #16213e;
      padding: 12px 16px;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e94560;
    }

    .header .status {
      margin-left: auto;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 10px;
      background: #0f3460;
      color: #53a8b6;
    }

    .header .status.connected { color: #4ecca3; background: #1b4332; }
    .header .status.error { color: #e94560; background: #3d0f1e; }

    .minimize-btn {
      background: none;
      border: 1px solid #0f3460;
      color: #53a8b6;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 8px;
      border-radius: 4px;
      line-height: 1;
    }

    .minimize-btn:hover { background: #0f3460; color: #e0e0e0; }

    .chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 90%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message.agent {
      background: #16213e;
      border: 1px solid #0f3460;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      white-space: normal;
    }

    .message.agent table {
      width: 100%;
      border-collapse: collapse;
      margin: 8px 0;
      font-size: 12px;
    }

    .message.agent th, .message.agent td {
      padding: 5px 8px;
      border: 1px solid #0f3460;
      text-align: left;
    }

    .message.agent th {
      background: #0f3460;
      color: #4ecca3;
      font-weight: 600;
    }

    .message.agent td {
      color: #e0e0e0;
    }

    .message.agent strong {
      color: #4ecca3;
    }

    .message.user {
      background: #0f3460;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    .message.system {
      background: #1b4332;
      border: 1px solid #2d6a4f;
      align-self: center;
      font-size: 11px;
      color: #4ecca3;
      text-align: center;
    }

    .message.error {
      background: #3d0f1e;
      border: 1px solid #e94560;
      align-self: center;
      font-size: 11px;
      color: #e94560;
    }

    .typing {
      align-self: flex-start;
      padding: 10px 14px;
      font-size: 13px;
      color: #666;
    }

    .typing::after {
      content: '';
      animation: dots 1.5s infinite;
    }

    @keyframes dots {
      0%, 20% { content: '.'; }
      40% { content: '..'; }
      60%, 100% { content: '...'; }
    }

    .input-area {
      padding: 10px 16px;
      background: #16213e;
      border-top: 1px solid #0f3460;
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-area textarea {
      flex: 1;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #0f3460;
      border-radius: 8px;
      color: #e0e0e0;
      font-size: 13px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
    }

    .input-area textarea:focus {
      outline: none;
      border-color: #e94560;
    }

    .input-area button {
      padding: 10px 16px;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      align-self: flex-end;
    }

    .input-area button:hover { background: #c73652; }
    .input-area button:disabled { background: #444; cursor: not-allowed; }

    .quick-actions {
      padding: 6px 16px;
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .quick-actions button {
      padding: 5px 10px;
      background: #0f3460;
      color: #53a8b6;
      border: 1px solid #0f3460;
      border-radius: 16px;
      cursor: pointer;
      font-size: 11px;
    }

    .quick-actions button:hover {
      background: #16213e;
      border-color: #53a8b6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>SAP Hours Agent</h1>
    <span class="status" id="status">checking...</span>
    <button class="minimize-btn" id="minimizeBtn" title="Minimize">&#x2015;</button>
  </div>

  <div class="chat" id="chat"></div>

  <div class="quick-actions" id="quickActions">
    <button data-msg="What does my timesheet look like this week?">This week</button>
    <button data-msg="Which days am I missing hours this month?">Missing days</button>
    <button data-msg="Copy last week to this week">Copy last week</button>
  </div>

  <div class="input-area">
    <textarea id="userInput" placeholder="Tell me about your week..." rows="2"></textarea>
    <button id="sendBtn">Send</button>
  </div>

  <script src="config.js"></script>
  <script src="sidepanel.js"></script>
</body>
</html>
